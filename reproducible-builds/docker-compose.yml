services:
  assemble:
    image: reproducible-anonymous
    build:
      context: ..
    command: :app:assembleRelease :app:bundleRelease
    volumes:
      - ./certs:/anonymous/app/certs:ro
      - ./outputs:/anonymous/app/build/outputs
    environment:
      - CI_APP_TITLE
      - CI_APP_FILENAME
      - CI_PACKAGE_ID
      - CI_BUILD_VARIANTS
      - CI_FORCE_INTERNAL_USER_FLAG
      - CI_KEYSTORE_PATH
      - CI_KEYSTORE_PASSWORD
      - CI_KEYSTORE_ALIAS
